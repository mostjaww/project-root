<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Portal Game Networks</title>
    <link rel="icon" href="game.png" type="image/x-icon">

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="login-card text-center">
      <h3 class="mb-4">🔐 Login</h3>

      <input
        type="email"
        id="email"
        class="form-control mb-3"
        placeholder="Email"
      />
      <input
        type="password"
        id="password"
        class="form-control mb-3"
        placeholder="Password"
      />

      <button onclick="login()" class="btn btn-custom w-100">Login</button>

      <p class="mt-3" style="font-size: 14px">
        Belum punya akun? <a href="register.html">Register</a>
      </p>

      <p class="text-center mt-4" style="font-size: 12px; color: #888">
        &copy; <script>document.write(new Date().getFullYear())</script> Tri Teguh. All rights reserved.
      </p>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
