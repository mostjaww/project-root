<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="icon" href="game.png" type="image/x-icon">

    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      .card-profile {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: 15px;
        padding: 30px;
        width: 400px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        box-shadow: none;
      }

      .btn-save {
        background: #22c55e;
        border: none;
      }

      .btn-save:hover {
        background: #16a34a;
      }

      .profile-img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #3b82f6;
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
      }
    </style>
  </head>
  <body>
    <!-- tombol back -->
    <a href="/dashboard.html" class="btn btn-outline-light back-btn"
      >← Kembali</a
    >

    <div class="card-profile text-center">
      <!-- foto profile -->
      <img src="https://i.pravatar.cc/150" class="profile-img mb-3" />

      <h4 class="mb-4">Edit Profile</h4>

      <input
        type="text"
        id="name"
        class="form-control mb-3"
        placeholder="Nama"
      />
      <input
        type="email"
        id="email"
        class="form-control mb-3"
        placeholder="Email"
      />
      <input
        type="password"
        id="password"
        class="form-control mb-3"
        placeholder="Password Baru (optional)"
      />

      <button onclick="updateProfile()" class="btn btn-save w-100">
        💾 Simpan Perubahan
      </button>
    </div>

    <script src="js/auth.js"></script>

    <script>
      const user = JSON.parse(localStorage.getItem("user"));

      if (!user) {
        window.location.href = "/";
      }

      document.getElementById("name").value = user.name;
      document.getElementById("email").value = user.email;
    </script>
  </body>
</html>
