<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Register - Portal Game Networks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" href="game.png" type="image/x-icon">
    
  </head>
  <body>
    <div class="login-card text-center">
      <h3 class="mb-4">📝 Register</h3>

      <input
        type="text"
        id="name"
        class="form-control mb-2"
        placeholder="Nama"
      />
      <input
        type="email"
        id="email"
        class="form-control mb-2"
        placeholder="Email"
      />
      <input
        type="password"
        id="password"
        class="form-control mb-3"
        placeholder="Password"
      />

      <button onclick="register()" class="btn w-100">Register</button>

      <p class="mt-3">
        Sudah punya akun? <a href="/" class="text-info">Login</a>
      </p>

      <p class="text-center mt-4" style="font-size: 12px; color: #888">
        &copy;
        <script>
          document.write(new Date().getFullYear());
        </script>
        Tri Teguh. All rights reserved.
      </p>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
