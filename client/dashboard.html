<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard - Portal Game Networks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="icon" href="game.png" type="image/x-icon">

    <style>
      body {
        background: #0f172a;
        color: white;
      }

      .sidebar {
        height: 100vh;
        background: #020617;
        padding: 20px;
      }

      .profile-img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #3b82f6;
      }

      .game-card {
        background: #1e293b;
        border-radius: 10px;
        padding: 15px;
        transition: 0.3s;
      }

      .game-card:hover {
        transform: scale(1.05);
        background: #334155;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-3 sidebar text-center">
          <img src="https://i.pravatar.cc/150" class="profile-img mb-3" />

          <h4 id="username">User</h4>
          <p id="useremail">email@mail.com</p>

          <div class="">
            <a href="edit-profile.html" class="btn btn-primary mt-3">Edit Profile</a>
            <button onclick="logout()" class="btn btn-danger mt-3">
              Logout
            </button>
          </div>
        </div>

        <!-- CONTENT -->
        <div class="col-md-9 p-4">
          <h2>🎮 Available Games</h2>

          <div class="row mt-4" id="gameList"></div>
        </div>
      </div>
    </div>

    <script>
      // 🔐 proteksi login
      const user = JSON.parse(localStorage.getItem("user"));

      if (!user) {
        window.location.href = "/";
      }

      // tampilkan data user
      document.getElementById("username").innerText = user.name;
      document.getElementById("useremail").innerText = user.email;

      // 🔥 LOAD GAME DARI BACKEND
      async function loadGames() {
        try {
          const res = await fetch("/api/games");
          const games = await res.json();

          const container = document.getElementById("gameList");
          container.innerHTML = "";

          games.forEach((game) => {
            container.innerHTML += `
          <div class="col-md-4 mb-3">
            <div class="game-card">
              <h5>${game.name}</h5>
              <a href="${game.path}" class="btn btn-primary btn-sm mt-2">Play</a>
            </div>
          </div>
        `;
          });
        } catch (error) {
          console.error("Error load games:", error);
        }
      }

      loadGames();

      function logout() {
        localStorage.clear();
        window.location.href = "/";
      }
    </script>
  </body>
</html>
